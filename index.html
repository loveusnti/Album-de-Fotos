<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁLBUM DE FOTOS</title>
    
    <link class="manifest" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('App lista para instalar'))
                .catch(err => console.log('Error al configurar app', err));
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Montserrat', sans-serif;
            position: relative;
        }

        /* --- PANTALLA DE INICIO --- */
        #intro-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background-color: transparent; 
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .titulo {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn-explorar {
            padding: 12px 40px;
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s;
            backdrop-filter: blur(5px);
        }

        .btn-explorar:hover {
            border-color: #ff4a7d;
            box-shadow: 0 0 20px rgba(255, 74, 125, 0.6);
            transform: scale(1.05);
        }

        /* --- EL LIENZO DEL UNIVERSO 3D --- */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            opacity: 1;
            filter: drop-shadow(0 0 15px rgba(255, 50, 100, 0.6)) blur(0.5px);
        }

        /* --- CAPA INTERACTIVA (ESTRELLAS CLICKABLES) --- */
        #capa-interactiva {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            opacity: 0;
            visibility: hidden;
            transition: opacity 2.5s ease;
        }

        .estrella-recuerdo {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 25px #ffffff, 0 0 45px #ff4a7d, 0 0 60px #ff4a7d;
            animation: palpitacion 2s infinite ease-in-out;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .estrella-recuerdo:hover {
            transform: scale(2.5);
            background-color: #ffb6c1;
            box-shadow: 0 0 40px #ffffff, 0 0 70px #ff4a7d, 0 0 90px #ff0055;
        }

        @keyframes palpitacion {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* --- VENTANA MODAL --- */
        #modal-recuerdo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 20;
            background: rgba(10, 5, 15, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 74, 125, 0.3);
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 74, 125, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #modal-recuerdo.activo {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .contenedor-foto {
            width: 100%;
            height: 340px; 
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 74, 125, 0.2);
            background-color: #000000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor-foto img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* --- RECOMENDACIÓN 3: TEXTO ENRIQUECIDO Y ANIMACIONES --- */
        .texto-recuerdo {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 300;
        }

        /* Clase para resaltar palabras clave en rosa cósmico */
        .resaltar-texto {
            color: #ff4a7d;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(255, 74, 125, 0.4);
        }

        /* Clase para hacer latir los corazones o emojis */
        .emoji-latido {
            display: inline-block;
            animation: latir 1.2s infinite ease-in-out;
        }

        @keyframes latir {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        #btn-mutear {
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 15;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }
        #btn-mutear.visible { opacity: 1; visibility: visible; }
        #btn-mutear:hover { border-color: #ff4a7d; color: #ffffff; box-shadow: 0 0 10px rgba(255, 74, 125, 0.4); }
    </style>
</head>
<body>

    <audio id="musica-fondo" src="musica.mp3" loop></audio>

    <div id="intro-screen">
        <h1 class="titulo">Álbum de Fotos</h1>
        <button class="btn-explorar" id="btn-explorar">EXPLORAR</button>
    </div>

    <div id="canvas-container"></div>

    <div id="capa-interactiva">
        <h1 class="titulo" style="position: absolute; top: 6%; width: 100%; text-align: center; font-size: 1.5rem; opacity: 0.5;">Álbum de Fotos</h1>
    </div>

    <button id="btn-mutear" onclick="toggleMusica()">🎵</button>

    <div id="modal-recuerdo">
        <div class="contenedor-foto">
            <img id="modal-img" src="" alt="Recuerdo">
        </div>
        <p class="texto-recuerdo" id="modal-texto">Mensaje por defecto.</p>
        <button class="btn-cerrar" onclick="cerrarModal()">CERRAR</button>
    </div>

    <script>
        // --- CONFIGURACIÓN DE TUS PUNTOS DE RECUERDO CON TEXTO ENRIQUECIDO (RECOMENDACIÓN 3) ---
        const recuerdos = [
            {
                texto: "Como la vida es tan increíble, que me permitió conocerte, <span class='resaltar-texto'>te amo con todo mi corazón</span>. <span class='emoji-latido'>🤍</span>",
                foto: "foto1.jpg", 
                top: "16%",        
                left: "15%",       
                tamano: "13px"
            },
            {
                texto: "Me encanta <span class='resaltar-texto'>hacerte reír</span>, verte, abrazarte y besarte. <span class='emoji-latido'>🥰</span>",
                foto: "foto2.jpg", 
                top: "22%", 
                left: "32%",
                tamano: "15px"
            },
            {
                texto: "Llegaste sin avisar, sin pedir permiso y sin que te estuvieras buscando. Y en cuestión de días me di cuenta que <span class='resaltar-texto'>vales muchísimo</span>. <span class='emoji-latido'>✨</span>",
                foto: "foto3.jpg", 
                top: "15%", 
                left: "50%",
                tamano: "12px"
            },
            {
                texto: "Si alguien me hubiera dicho que me iba a <span class='resaltar-texto'>enamorar así de rápido</span>, no lo habría creído. Llegaste tú y rompiste todas mis reglas y planes. Qué hermoso desorden causaste.",
                foto: "foto4.jpg", 
                top: "23%", 
                left: "68%",
                tamano: "14px"
            },
            {
                texto: "Simplemente te amo, la palabra dice poco para <span class='resaltar-texto'>todo lo que siento por ti</span>. <span class='emoji-latido'>🤍</span>",
                foto: "foto5.jpg", 
                top: "17%", 
                left: "85%",
                tamano: "16px"
            }
        ];

        let escena, camara, renderizador, sistemaParticulas, estrellasLejanas;
        let estrellaFugaz, geometriaFugaz; // Variables para la estrella fugaz
        let fugazActiva = false;
        let velocidadFugazX = 0, velocidadFugazY = 0;

        let velocidadRotacion = 0.0012; 
        const contenedor3D = document.getElementById('canvas-container');
        const capaInteractiva = document.getElementById('capa-interactiva');
        const btnExplorar = document.getElementById('btn-explorar');
        const pantallaIntro = document.getElementById('intro-screen');
        const audio = document.getElementById('musica-fondo');
        const btnMutear = document.getElementById('btn-mutear');
        
        const modal = document.getElementById('modal-recuerdo');
        const modalImg = document.getElementById('modal-img');
        const modalTexto = document.getElementById('modal-texto');

        function crearTexturaEstrella() {
            const canvasTextura = document.createElement('canvas');
            canvasTextura.width = 16; canvasTextura.height = 16;
            const ctx = canvasTextura.getContext('2d');
            const gradiente = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradiente.addColorStop(0, 'rgba(255,255,255,1)');
            gradiente.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradiente; ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvasTextura);
        }

        // 1. INICIALIZAR EL UNIVERSO NITIDO
        function initUniverso() {
            escena = new THREE.Scene();
            
            camara = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camara.position.z = 550; 

            renderizador = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderizador.setSize(window.innerWidth, window.innerHeight);
            renderizador.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            contenedor3D.appendChild(renderizador.domElement);

            const texturaComun = crearTexturaEstrella();

            // Estrellas lejanas nítidas de fondo
            const geoLejanas = new THREE.BufferGeometry();
            const posLejanas = new Float32Array(1200 * 3); 
            
            for(let i=0; i<1200*3; i+=3) {
                posLejanas[i] = (Math.random() - 0.5) * 600;
                posLejanas[i+1] = (Math.random() - 0.5) * 500;
                posLejanas[i+2] = Math.random() * 400 - 100; 
            }
            geoLejanas.setAttribute('position', new THREE.BufferAttribute(posLejanas, 3));
            
            const matLejanas = new THREE.PointsMaterial({
                size: 1.0, 
                map: texturaComun,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false,
                color: 0xffb6c1 
            });
            estrellasLejanas = new THREE.Points(geoLejanas, matLejanas);
            escena.add(estrellasLejanas);


            // --- TU UNIVERSO HORIZONTAL ORIGINAL ---
            const cuentaParticulas = 3500;
            const geometria = new THREE.BufferGeometry();
            const posiciones = new Float32Array(cuentaParticulas * 3);
            const colores = new Float32Array(cuentaParticulas * 3);

            const coloresPaleta = [
                new THREE.Color("#ffffff"),
                new THREE.Color("#ffb6c1"),
                new THREE.Color("#ff4a7d"),
                new THREE.Color("#ff0055")
            ];

            for (let i = 0; i < cuentaParticulas * 3; i += 3) {
                const r = Math.pow(Math.random(), 2.5) * 120; 
                const t = Math.random() * Math.PI * 2 * 4 + (r * 0.05); 

                posiciones[i] = Math.cos(t) * r + (Math.random() - 0.5) * 8;     
                posiciones[i + 1] = (Math.random() - 0.5) * 12;                 
                posiciones[i + 2] = Math.sin(t) * r + (Math.random() - 0.5) * 8; 

                const colorEscogido = coloresPaleta[Math.floor(Math.random() * coloresPaleta.length)];
                colores[i] = colorEscogido.r;
                colores[i + 1] = colorEscogido.g;
                colores[i + 2] = colorEscogido.b;
            }

            geometria.setAttribute('position', new THREE.BufferAttribute(posiciones, 3));
            geometria.setAttribute('color', new THREE.BufferAttribute(colores, 3));

            const material = new THREE.PointsMaterial({
                size: 1.8,
                map: texturaComun,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true
            });

            sistemaParticulas = new THREE.Points(geometria, material);
            escena.add(sistemaParticulas);

            // --- RECOMENDACIÓN 2: PREPARAR OBJETO PARA ESTRELLA FUGAZ ---
            geometriaFugaz = new THREE.BufferGeometry();
            const posFugaz = new Float32Array(3); // Un solo punto dinámico
            geometriaFugaz.setAttribute('position', new THREE.BufferAttribute(posFugaz, 3));
            
            const matFugaz = new THREE.PointsMaterial({
                size: 4.5, // Más grande y brillante para que se note
                map: texturaComun,
                blending: THREE.AdditiveBlending,
                transparent: true,
                color: 0xffffff
            });
            estrellaFugaz = new THREE.Points(geometriaFugaz, matFugaz);
            escena.add(estrellaFugaz);

            window.addEventListener('resize', enAjustePantalla);
        }

        // Función para detonar la estrella fugaz con coordenadas aleatorias
        function dispararEstrellaFugaz() {
            if (enHiperviaje) return; // No disparar durante la transición inicial
            
            const posiciones = geometriaFugaz.attributes.position.array;
            
            // Aparece arriba a la izquierda
            posiciones[0] = (Math.random() * -100) - 50; 
            posiciones[1] = (Math.random() * 50) + 50;   
            posiciones[2] = (Math.random() * 50) + 50;   // Cerca de la cámara activa
            
            geometriaFugaz.attributes.position.needsUpdate = true;
            
            // Velocidad rápida en diagonal hacia abajo a la derecha
            velocidadFugazX = (Math.random() * 3) + 4;
            velocidadFugazY = (Math.random() * -2) - 3;
            
            fugazActiva = true;
        }

        function enAjustePantalla() {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        }

        let enHiperviaje = true; // Evita estrellas fugaces en la pantalla de inicio

        function animar() {
            requestAnimationFrame(animar);
            
            sistemaParticulas.rotation.y += velocidadRotacion; 
            sistemaParticulas.rotation.x = 0.28; 
            estrellasLejanas.rotation.y -= 0.0003;

            // Mover estrella fugaz si está activa en el frame
            if (fugazActiva) {
                const posiciones = geometriaFugaz.attributes.position.array;
                posiciones[0] += velocidadFugazX;
                posiciones[1] += velocidadFugazY;
                geometriaFugaz.attributes.position.needsUpdate = true;

                // Si se sale de los límites visuales, se apaga
                if (posiciones[0] > 200 || posiciones[1] < -200) {
                    fugazActiva = false;
                }
            }

            renderizador.render(escena, camara);
        }

        // 2. GENERAR LAS 5 ESTRELLAS INTERACTIVAS
        function generarPuntosInteractivos() {
            recuerdos.forEach((recuerdo) => {
                const punto = document.createElement('div');
                punto.classList.add('estrella-recuerdo');
                
                punto.style.top = recuerdo.top;
                punto.style.left = recuerdo.left;
                punto.style.width = recuerdo.tamano;
                punto.style.height = recuerdo.tamano;
                punto.style.animationDelay = `${Math.random() * 2}s`;

                punto.addEventListener('click', () => {
                    modalImg.src = recuerdo.foto;
                    modalTexto.innerHTML = recuerdo.texto;
                    modal.classList.add('activo');
                });

                capaInteractiva.appendChild(punto);
            });
        }

        function cerrarModal() {
            modal.classList.remove('activo');
            setTimeout(() => { modalImg.src = ""; }, 500); 
        }

        function toggleMusica() {
            if (audio.paused) { audio.play(); btnMutear.innerHTML = "🎵"; } 
            else { audio.pause(); btnMutear.innerHTML = "🔇"; }
        }

        initUniverso();
        animar();

        // 3. EFECTO ZOOM CINEMATOGRÁFICO Y DISPARADOR DE ESTRELLAS FUGACES
        btnExplorar.addEventListener('click', () => {
            pantallaIntro.style.opacity = '0';
            audio.play().catch(err => console.log("Audio play blocked:", err));
            
            velocidadRotacion = 0.01; 

            setTimeout(() => {
                pantallaIntro.style.display = 'none';
                btnMutear.classList.add('visible');

                let objetivoZ = 150; 

                let superZoom = () => {
                    if (camara.position.z > objetivoZ) {
                        let paso = (camara.position.z - objetivoZ) * 0.06;
                        camara.position.z -= Math.max(paso, 0.4);
                        
                        requestAnimationFrame(superZoom);
                    } else {
                        camara.position.z = objetivoZ;
                        velocidadRotacion = 0.0012; 
                        enHiperviaje = false; // El viaje terminó, activamos las estrellas fugaces
                        
                        capaInteractiva.style.visibility = 'visible';
                        capaInteractiva.style.opacity = '1';
                        generarPuntosInteractivos();

                        // --- RECOMENDACIÓN 2: Disparador cada 4 segundos exactos ---
                        setInterval(dispararEstrellaFugaz, 4000);
                        dispararEstrellaFugaz(); // Lanza la primera de inmediato
                    }
                };
                superZoom();

            }, 400); 
        });
    </script>
</body>
</html>
